# Railway (Nixpacks) build for a Node monorepo (root backend + Vite frontend)
# - Installs root deps
# - Installs frontend deps and builds to frontend/dist
# - Starts backend via `npm start`

[phases.setup]
# Needed for native deps like better-sqlite3 on Linux
nixPkgs = ["python3", "gcc", "gnumake", "git", "chromium"]

[phases.install]
cmds = [
  "npm ci --omit=dev || npm install --omit=dev",
  "npm --prefix frontend ci || npm --prefix frontend install"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",
  "which chromium > /app/.chromium-path || which chromium-browser > /app/.chromium-path || true"
]

[start]
cmd = "PUPPETEER_EXECUTABLE_PATH=$(cat /app/.chromium-path 2>/dev/null | tr -d '\\n') bash start.sh"
