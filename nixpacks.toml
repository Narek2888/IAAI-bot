# Railway (Nixpacks) build for a Node monorepo (root backend + Vite frontend)
# - Installs root deps
# - Installs frontend deps and builds to frontend/dist
# - Starts backend via `npm start`

[phases.setup]
# Needed for native deps like better-sqlite3 on Linux
nixPkgs = ["python3", "gcc", "gnumake", "git"]
# Required shared libraries for @sparticuz/chromium headless browser
aptPkgs = [
  "libnss3", "libnspr4",
  "libatk1.0-0", "libatk-bridge2.0-0",
  "libcups2", "libdrm2", "libgbm1",
  "libxkbcommon0", "libxcomposite1", "libxdamage1",
  "libxfixes3", "libxrandr2", "libxext6", "libxi6",
  "libx11-6", "libx11-xcb1", "libxcb1", "libxrender1", "libxtst6",
  "libasound2", "libpango-1.0-0", "libcairo2",
  "libglib2.0-0", "libfontconfig1", "fonts-liberation"
]

[phases.install]
cmds = [
  "npm ci --omit=dev || npm install --omit=dev",
  "npm --prefix frontend ci || npm --prefix frontend install"
]

[phases.build]
cmds = ["npm --prefix frontend run build"]

[start]
cmd = "npm start"
